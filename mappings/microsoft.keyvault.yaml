- arm_type: Microsoft.KeyVault/vaults
  tf_type: azurerm_key_vault
  attribute_map:
    properties.sku.name: sku_name
    properties.tenantId: tenant_id
    properties.enableRbacAuthorization: enable_rbac_authorization
    properties.enabledForDeployment: enabled_for_deployment
    properties.enabledForDiskEncryption: enabled_for_disk_encryption
    properties.enabledForTemplateDeployment: enabled_for_template_deployment
    properties.softDeleteRetentionInDays: soft_delete_retention_days
    properties.publicNetworkAccess: public_network_access_enabled

- arm_type: Microsoft.KeyVault/vaults/secrets
  tf_type: azurerm_key_vault_secret
  attribute_map: {}

- arm_type: Microsoft.KeyVault/vaults/accessPolicies
  tf_type: azurerm_key_vault_access_policy
  attribute_map: {}
