name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install bicep
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep && sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Unit + golden-file tests
        run: pytest -q

      - name: Validate generated terraform fixtures
        run: |
          shopt -s nullglob
          fixtures=(tests/cases/*/expected)
          if [ ${#fixtures[@]} -eq 0 ]; then
            echo "No tests/cases/*/expected fixtures present; smoke test in pytest covers end-to-end validation."
            exit 0
          fi
          for d in "${fixtures[@]}"; do
            (cd "$d" && terraform init -backend=false && terraform validate)
          done
